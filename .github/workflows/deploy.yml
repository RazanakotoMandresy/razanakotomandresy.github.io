name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # se déclenche à chaque push sur main

  # Permet aussi de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; annule les déploiements en attente
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Angular app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: portfolio
        run: npm ci

      - name: Build
        working-directory: portfolio
        # Remplace mandresy-portfolio par le nom exact de ton dépôt GitHub
        run: npm run build -- --base-href /mandresy-portfolio/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio/dist/portfolio/browser

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
